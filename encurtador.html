<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Encurtador Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:1rem}
.container{max-width:600px;margin:0 auto}
.logo{font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:0.5rem;background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:2rem;font-size:0.9rem}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.card h2{font-size:1.1rem;color:#6366f1;margin-bottom:1rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;margin-bottom:0.4rem;font-weight:600;font-size:0.9rem}
.form-group label span{color:#ef4444}
.form-group input,.form-group textarea{width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:0.9rem;border-radius:10px;font-size:1rem;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:#6366f1}
.form-group textarea{min-height:100px;resize:vertical}
.form-group small{color:#64748b;font-size:0.75rem;margin-top:0.3rem;display:block}
.btn{width:100%;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;padding:1rem;font-size:1rem;font-weight:700;border-radius:10px;cursor:pointer;transition:all 0.3s}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.result{display:none;margin-top:1rem;padding:1rem;background:#0f172a;border:2px solid #10b981;border-radius:10px}
.result.show{display:block}
.result textarea{width:100%;background:#020617;border:1px solid #334155;color:#10b981;padding:0.8rem;border-radius:8px;font-family:monospace;font-size:0.8rem;word-break:break-all;resize:none;outline:none}
.btns{display:flex;gap:0.5rem;margin-top:0.8rem}
.btns button{flex:1;background:#334155;color:#e2e8f0;border:1px solid #475569;padding:0.6rem;border-radius:8px;cursor:pointer;font-weight:600}
.btns button:hover{background:#475569}
.toast{position:fixed;bottom:1rem;right:1rem;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:0.8rem 1.2rem;display:none;z-index:10000;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.toast.show{display:block}
</style>
</head>
<body>

<div class="container">
  <div class="logo">⚡ Encurtador Pro</div>
  <div class="subtitle">Monetize seus links com anúncios</div>

  <div class="card">
    <h2>🔗 Encurtar Link</h2>

    <div class="form-group">
      <label>Título / Nome <span>*</span></label>
      <input type="text" id="titulo" placeholder="Ex: Under Boss XC v4.0.4">
    </div>

    <div class="form-group">
      <label>Descrição <span>*</span></label>
      <textarea id="descricao" placeholder="Descrição do conteúdo..."></textarea>
    </div>

    <div class="form-group">
      <label>Link de destino <span>*</span></label>
      <input type="text" id="linkDestino" placeholder="https://t.me/seu_canal">
      <small>Link final após os anúncios</small>
    </div>

    <div class="form-group">
      <label>Imagem (opcional)</label>
      <input type="file" id="imagem" accept="image/*" style="padding:0.5rem">
    </div>

    <!-- BOTÃO COM ONCLICK INLINE - GARANTIDO QUE FUNCIONA -->
    <button class="btn" id="btnGerar" onclick="gerarLink()" type="button">🔐 GERAR LINK</button>

    <div class="result" id="resultBox">
      <div style="font-size:0.85rem;color:#94a3b8;margin-bottom:0.5rem">✅ Link gerado!</div>
      <textarea id="linkGerado" readonly rows="2"></textarea>
      <div class="btns">
        <button onclick="copiarLink()">📋 Copiar</button>
        <button onclick="abrirLink()">🔗 Abrir</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== VARIÁVEIS GLOBAIS =====
var DB_KEY='encurtador_v1';
var SESS_PREFIX='enc_';
var imgBase64=null;

// ===== FUNÇÃO PRINCIPAL: GERAR LINK =====
function gerarLink(){
  // 1. PEGAR VALORES
  var titulo=document.getElementById('titulo').value.trim();
  var descricao=document.getElementById('descricao').value.trim();
  var linkDestino=document.getElementById('linkDestino').value.trim();

  // 2. VALIDAR
  if(!titulo){mostrarToast('❌ Digite o título!');return;}
  if(!descricao){mostrarToast('❌ Digite a descrição!');return;}
  if(!linkDestino){mostrarToast('❌ Cole o link de destino!');return;}
  if(linkDestino.indexOf('http')!==0){mostrarToast('❌ Link deve começar com http://');return;}

  // 3. DESABILITAR BOTÃO
  var btn=document.getElementById('btnGerar');
  btn.disabled=true;
  btn.textContent='⏳ Gerando...';

  // 4. PROCESSAR (com delay para feedback visual)
  setTimeout(function(){
    try{
      // Criar ID único
      var id='lnk'+Date.now().toString(36);

      // Montar objeto de dados
      var dados={t:titulo,d:descricao,u:linkDestino};
      if(imgBase64)dados.i=imgBase64;

      // Salvar em sessionStorage
      var json=JSON.stringify(dados);
      sessionStorage.setItem(SESS_PREFIX+id,json);
      try{localStorage.setItem(SESS_PREFIX+id,json);}catch(e){}

      // Criar link curto
      var base=window.location.href;
      base=base.replace('encurtador.html','index.html');
      base=base.split('?')[0];
      var linkFinal=base+'?id='+id;

      // Salvar no histórico
      var historico=[];
      try{historico=JSON.parse(localStorage.getItem(DB_KEY))||[];}catch(e){}
      historico.unshift({id:id,titulo:titulo,url:linkFinal,destino:linkDestino,data:new Date().toLocaleString('pt-BR'),temImg:!!imgBase64});
      try{localStorage.setItem(DB_KEY,JSON.stringify(historico));}catch(e){}

      // MOSTRAR RESULTADO
      document.getElementById('linkGerado').value=linkFinal;
      document.getElementById('resultBox').classList.add('show');

      // RESTAURAR BOTÃO
      btn.disabled=false;
      btn.textContent='🔐 GERAR LINK';

      mostrarToast('✅ Link gerado com sucesso!');

      // Copiar automaticamente
      setTimeout(copiarLink,500);

    }catch(erro){
      mostrarToast('❌ Erro: '+erro.message);
      btn.disabled=false;
      btn.textContent='🔐 GERAR LINK';
    }
  },500);
}

// ===== IMAGEM =====
document.getElementById('imagem').addEventListener('change',function(e){
  var file=e.target.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){mostrarToast('❌ Imagem muito grande! Max 5MB');return;}
  var reader=new FileReader();
  reader.onload=function(e){imgBase64=e.target.result;mostrarToast('✅ Imagem carregada');};
  reader.readAsDataURL(file);
});

// ===== COPIAR =====
function copiarLink(){
  var el=document.getElementById('linkGerado');
  var txt=el.value;
  if(!txt)return;

  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(txt).then(function(){mostrarToast('📋 Copiado!');}).catch(function(){fallbackCopy(txt);});
  }else{fallbackCopy(txt);}
}
function fallbackCopy(txt){
  var ta=document.createElement('textarea');
  ta.value=txt;ta.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');mostrarToast('📋 Copiado!');}catch(e){mostrarToast('❌ Falha ao copiar');}
  document.body.removeChild(ta);
}

// ===== ABRIR =====
function abrirLink(){
  var url=document.getElementById('linkGerado').value;
  if(url)window.open(url,'_blank');
}

// ===== TOAST =====
function mostrarToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

console.log('Encurtador Pro carregado');
</script>

</body>
</html>

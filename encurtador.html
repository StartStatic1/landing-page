<!-- ENCURTADOR.HTML COMPLETO CORRIGIDO -->
<!-- AGORA SEM URI_TOO_LONG -->
<!-- SEM BASE64 NA URL -->
<!-- FUNCIONANDO NA VERCEL -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encurtador Pro</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
padding:20px
}

.container{
max-width:650px;
margin:auto
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px
}

h1{
text-align:center;
margin-bottom:25px
}

input,
textarea{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:16px;
background:#0f172a;
border:1px solid #334155;
border-radius:12px;
color:#fff
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#6366f1;
color:#fff;
font-weight:bold;
cursor:pointer;
font-size:16px
}

button:disabled{
opacity:.6
}

.result{
display:none;
margin-top:20px
}

.result textarea{
height:90px
}

.preview{
margin-top:20px;
display:none
}

.preview img{
width:100%;
border-radius:16px
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#111827;
padding:14px 18px;
border-radius:12px;
display:none;
z-index:9999
}

.toast.show{
display:block
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>⚡ Encurtador Pro</h1>

<input type="text" id="titulo" placeholder="Título">

<textarea id="descricao" placeholder="Descrição"></textarea>

<input type="text" id="tag1" placeholder="Tag 1">

<input type="text" id="tag2" placeholder="Tag 2">

<input type="text" id="linkDestino" placeholder="Link download">

<input type="text" id="versao" placeholder="Versão">

<input type="text" id="tamanho" placeholder="Tamanho">

<input type="text" id="requirements" placeholder="Requirements">

<input type="text" id="downloads" placeholder="Downloads">

<input type="text" id="developer" placeholder="Developer">

<input type="text" id="linkTelegram" placeholder="Telegram">

<input type="file" id="imagem" accept="image/*">

<button onclick="gerarLink()" id="btnGerar">
GERAR LINK
</button>

<div class="preview" id="preview">
<img id="previewImg">
</div>

<div class="result" id="resultBox">

<textarea readonly id="linkGerado"></textarea>

<div style="display:flex;gap:10px;margin-top:10px">

<button onclick="copiarLink()">
COPIAR
</button>

<button onclick="abrirLink()">
ABRIR
</button>

</div>

</div>

</div>

</div>

<div class="toast" id="toast"></div>

<script>

var imagemURL = '';

function toast(msg){

var t = document.getElementById('toast');

t.innerText = msg;

t.classList.add('show');

setTimeout(function(){

t.classList.remove('show');

},2500);

}

document.getElementById('imagem')
.addEventListener('change',function(e){

var file = e.target.files[0];

if(!file) return;

if(file.size > 2 * 1024 * 1024){

toast('Imagem muito grande');

return;

}

var reader = new FileReader();

reader.onload = function(evt){

imagemURL = evt.target.result;

document.getElementById('preview')
.style.display = 'block';

document.getElementById('previewImg')
.src = imagemURL;

};

reader.readAsDataURL(file);

});

function gerarLink(){

var titulo =
document.getElementById('titulo').value.trim();

var descricao =
document.getElementById('descricao').value.trim();

var linkDestino =
document.getElementById('linkDestino').value.trim();

if(!titulo){
toast('Digite o título');
return;
}

if(!descricao){
toast('Digite a descrição');
return;
}

if(!linkDestino){
toast('Digite o link');
return;
}

if(!imagemURL){
toast('Selecione imagem');
return;
}

var btn =
document.getElementById('btnGerar');

btn.disabled = true;

btn.innerText = 'GERANDO...';

try{

var id =
'APP_' + Date.now();

var dados = {

t: titulo,
d: descricao,
u: linkDestino,
i: imagemURL,
tg1: document.getElementById('tag1').value,
tg2: document.getElementById('tag2').value,
v: document.getElementById('versao').value,
s: document.getElementById('tamanho').value,
r: document.getElementById('requirements').value,
dl: document.getElementById('downloads').value,
dev: document.getElementById('developer').value,
tel: document.getElementById('linkTelegram').value

};

localStorage.setItem(
'app_' + id,
JSON.stringify(dados)
);

var base =
window.location.origin;

var path =
window.location.pathname
.replace('encurtador.html','');

var link =
base + path + 'index.html?id=' + id;

document.getElementById('linkGerado')
.value = link;

document.getElementById('resultBox')
.style.display = 'block';

toast('Link gerado');

}catch(e){

console.error(e);

toast('Erro');

}

btn.disabled = false;

btn.innerText = 'GERAR LINK';

}

function copiarLink(){

var txt =
document.getElementById('linkGerado').value;

navigator.clipboard.writeText(txt)
.then(function(){

toast('Copiado');

})
.catch(function(){

var ta =
document.createElement('textarea');

ta.value = txt;

document.body.appendChild(ta);

ta.select();

document.execCommand('copy');

document.body.removeChild(ta);

toast('Copiado');

});

}

function abrirLink(){

window.open(
document.getElementById('linkGerado').value,
'_blank'
);

}

</script>

</body>
</html>

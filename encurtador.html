<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Encurtador Pro - Painel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  min-height:100vh;
  padding:1rem;
}

.container{
  max-width:650px;
  margin:0 auto;
}

.logo{
  font-size:2rem;
  font-weight:800;
  text-align:center;
  margin-bottom:.4rem;
  background:linear-gradient(135deg,#6366f1,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  text-align:center;
  color:#94a3b8;
  margin-bottom:2rem;
}

.card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:20px;
  padding:1.5rem;
}

.card h2{
  color:#6366f1;
  margin-bottom:1.3rem;
}

.form-group{
  margin-bottom:1rem;
}

.form-group label{
  display:block;
  margin-bottom:.5rem;
  font-weight:600;
}

.form-group input,
.form-group textarea{
  width:100%;
  background:#0f172a;
  border:1px solid #334155;
  color:#fff;
  padding:1rem;
  border-radius:12px;
  outline:none;
  font-size:1rem;
}

.form-group textarea{
  min-height:90px;
  resize:vertical;
}

.form-group input:focus,
.form-group textarea:focus{
  border-color:#6366f1;
}

.form-row{
  display:flex;
  gap:.8rem;
}

.form-row .form-group{
  flex:1;
}

.btn{
  width:100%;
  border:none;
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:#fff;
  padding:1rem;
  border-radius:14px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.result{
  display:none;
  margin-top:1.5rem;
  background:#0f172a;
  border:2px solid #10b981;
  border-radius:14px;
  padding:1rem;
}

.result.show{
  display:block;
}

.result textarea{
  width:100%;
  background:#020617;
  border:1px solid #334155;
  color:#10b981;
  border-radius:10px;
  padding:.8rem;
  resize:none;
  font-family:monospace;
}

.btns{
  display:flex;
  gap:.5rem;
  margin-top:.8rem;
}

.btns button{
  flex:1;
  border:none;
  background:#334155;
  color:#fff;
  padding:.8rem;
  border-radius:10px;
  cursor:pointer;
}

.btns button:hover{
  background:#475569;
}

.preview{
  display:none;
  margin-top:1.5rem;
  background:#0f172a;
  border-radius:16px;
  overflow:hidden;
}

.preview img{
  width:100%;
  display:block;
}

.preview-info{
  padding:1rem;
}

.preview-title{
  font-size:1.2rem;
  font-weight:700;
  margin-bottom:.5rem;
}

.preview-desc{
  color:#94a3b8;
}

.toast{
  position:fixed;
  right:1rem;
  bottom:1rem;
  background:#1e293b;
  border:1px solid #334155;
  border-radius:12px;
  padding:1rem 1.2rem;
  display:none;
  z-index:99999;
}

.toast.show{
  display:block;
}

@media(max-width:600px){
  .form-row{
    flex-direction:column;
  }
}
</style>
</head>
<body>

<div class="container">

  <div class="logo">⚡ Encurtador Pro</div>
  <div class="subtitle">Landing Page com Monetização</div>

  <div class="card">

    <h2>🔗 Criar Landing</h2>

    <div class="form-group">
      <label>Título *</label>
      <input type="text" id="titulo" placeholder="Ex: Proton VPN MOD APK">
    </div>

    <div class="form-group">
      <label>Descrição *</label>
      <textarea id="descricao" placeholder="Descrição do conteúdo..."></textarea>
    </div>

    <div class="form-row">

      <div class="form-group">
        <label>Tag 1</label>
        <input type="text" id="tag1" placeholder="VPN">
      </div>

      <div class="form-group">
        <label>Tag 2</label>
        <input type="text" id="tag2" placeholder="Tools">
      </div>

    </div>

    <div class="form-group">
      <label>Link Download *</label>
      <input type="text" id="linkDestino" placeholder="https://...">
    </div>

    <div class="form-row">

      <div class="form-group">
        <label>Versão</label>
        <input type="text" id="versao" placeholder="5.0">
      </div>

      <div class="form-group">
        <label>Tamanho</label>
        <input type="text" id="tamanho" placeholder="52MB">
      </div>

    </div>

    <div class="form-group">
      <label>Imagem *</label>
      <input type="file" id="imagem" accept="image/*">
    </div>

    <button class="btn" id="btnGerar">
      🔐 GERAR LINK
    </button>

    <div class="result" id="resultBox">

      <div style="margin-bottom:.7rem;color:#10b981;font-weight:700">
        ✅ Link gerado!
      </div>

      <textarea id="linkGerado" rows="3" readonly></textarea>

      <div class="btns">
        <button onclick="copiarLink()">📋 Copiar</button>
        <button onclick="abrirLink()">🔗 Abrir</button>
      </div>

    </div>

    <div class="preview" id="preview">

      <img id="previewImg">

      <div class="preview-info">
        <div class="preview-title" id="previewTitle"></div>
        <div class="preview-desc" id="previewDesc"></div>
      </div>

    </div>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>

let imgBase64 = null;

// ===== TOAST =====
function toast(msg){
  const t = document.getElementById('toast');

  t.textContent = msg;
  t.classList.add('show');

  setTimeout(()=>{
    t.classList.remove('show');
  },2500);
}

// ===== IMAGEM =====
document.addEventListener('DOMContentLoaded',()=>{

  const imagem = document.getElementById('imagem');

  imagem.addEventListener('change',(e)=>{

    const file = e.target.files[0];

    if(!file)return;

    if(file.size > 5*1024*1024){
      toast('❌ Imagem muito grande');
      return;
    }

    const reader = new FileReader();

    reader.onload = function(ev){

      imgBase64 = ev.target.result;

      document.getElementById('preview').style.display='block';
      document.getElementById('previewImg').src = imgBase64;

      document.getElementById('previewTitle').textContent =
      document.getElementById('titulo').value || 'Preview';

      document.getElementById('previewDesc').textContent =
      document.getElementById('descricao').value || '';

      toast('✅ Imagem carregada');

    };

    reader.readAsDataURL(file);

  });

});

// ===== GERAR =====
document.getElementById('btnGerar').addEventListener('click', gerarLink);

function gerarLink(){

  try{

    const titulo = document.getElementById('titulo').value.trim();
    const descricao = document.getElementById('descricao').value.trim();
    const linkDestino = document.getElementById('linkDestino').value.trim();

    if(!titulo){
      toast('❌ Digite o título');
      return;
    }

    if(!descricao){
      toast('❌ Digite a descrição');
      return;
    }

    if(!linkDestino){
      toast('❌ Digite o link');
      return;
    }

    if(!linkDestino.startsWith('http')){
      toast('❌ Link inválido');
      return;
    }

    if(!imgBase64){
      toast('❌ Adicione uma imagem');
      return;
    }

    const dados = {

      t: titulo,
      d: descricao,
      u: linkDestino,
      i: imgBase64,

      tg1: document.getElementById('tag1').value.trim(),
      tg2: document.getElementById('tag2').value.trim(),

      v: document.getElementById('versao').value.trim(),
      s: document.getElementById('tamanho').value.trim()

    };

    // ===== BASE64 URL =====
    const encoded = btoa(
      unescape(
        encodeURIComponent(JSON.stringify(dados))
      )
    );

    // ===== LINK FINAL =====
    const linkFinal =
      window.location.origin +
      '/index.html?d=' +
      encodeURIComponent(encoded);

    document.getElementById('linkGerado').value = linkFinal;

    document.getElementById('resultBox')
    .classList.add('show');

    toast('✅ Link gerado com sucesso');

    console.log('LINK:', linkFinal);

  }catch(e){

    console.error(e);

    toast('❌ Erro ao gerar link');

  }

}

// ===== COPIAR =====
function copiarLink(){

  const txt =
  document.getElementById('linkGerado').value;

  navigator.clipboard.writeText(txt);

  toast('📋 Link copiado');

}

// ===== ABRIR =====
function abrirLink(){

  const url =
  document.getElementById('linkGerado').value;

  window.open(url,'_blank');

}

</script>

</body>
</html>

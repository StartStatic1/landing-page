<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechZone Painel Pro</title>
    <style>
        :root {
            --primary: #4f46e5; --secondary: #0ea5e9;
            --dark: #0f172a; --darker: #020617; --card: #1e293b;
            --text: #f8fafc; --text-muted: #94a3b8; --border: #334155;
            --success: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--darker); color: var(--text); padding: 2rem 1rem; }
        .panel-container { max-width: 900px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .logo { font-size: 2rem; font-weight: 900; color: var(--primary); margin-bottom: 2rem; text-align: center; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 700; font-size: 0.9rem; color: var(--text); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--dark); border: 1px solid var(--border); color: var(--text); padding: 1rem; border-radius: 12px; font-size: 1rem; outline: none; }
        .form-group input:focus { border-color: var(--primary); }
        .btn-generate { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 1.2rem; font-size: 1.1rem; font-weight: 800; border-radius: 14px; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .btn-generate:hover { transform: translateY(-3px); }
        .result-box { display: none; margin-top: 2rem; padding: 1.5rem; background: rgba(16,185,129,0.1); border: 2px solid var(--success); border-radius: 16px; }
        .result-url { width: 100%; background: var(--darker); color: var(--success); padding: 1rem; border-radius: 10px; border: none; margin: 1rem 0; font-family: monospace; resize: none; }
        .btn-copy { background: var(--success); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        @media(max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="panel-container">
        <div class="logo">⚡ TechZone Painel Pro</div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Nome do App *</label>
                <input type="text" id="appName" placeholder="Ex: Top Streamings">
            </div>
            <div class="form-group">
                <label>Versão / Tamanho</label>
                <input type="text" id="appVersion" placeholder="Ex: v6.5 • 45MB">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Categoria</label>
                <select id="appCategory">
                    <option value="📱 Apps">📱 Apps</option>
                    <option value="🎮 Jogos">🎮 Jogos</option>
                    <option value="🔓 Mod APK">🔓 Mod APK</option>
                </select>
            </div>
            <div class="form-group">
                <label>Emoji/Ícone</label>
                <input type="text" id="appIcon" placeholder="Ex: 🎬">
            </div>
        </div>

        <div class="form-group">
            <label>Descrição do App</label>
            <input type="text" id="appDesc" placeholder="Breve descrição...">
        </div>

        <div class="form-group">
            <label>URL da Imagem / Print do App (Para a Landing Page)</label>
            <input type="text" id="appImage" placeholder="https://i.imgur.com/suaimagem.jpg">
        </div>

        <div class="form-group">
            <label>URL de Destino (Link Final) *</label>
            <input type="text" id="destUrl" placeholder="https://t.me/seu_canal">
        </div>

        <button class="btn-generate" onclick="gerarLink()">🚀 GERAR LINK DE DOWNLOAD</button>

        <div class="result-box" id="resultBox">
            <h3 style="color: var(--success);">✅ Link Gerado com Sucesso!</h3>
            <textarea class="result-url" id="outputLink" rows="3" readonly></textarea>
            <button class="btn-copy" onclick="copiarLink()">📋 COPIAR LINK</button>
        </div>
    </div>

    <script>
        function gerarLink() {
            const name = document.getElementById('appName').value.trim();
            const url = document.getElementById('destUrl').value.trim();
            if (!name || !url) { alert('Nome e URL de destino são obrigatórios!'); return; }

            const data = {
                n: name,
                v: document.getElementById('appVersion').value.trim(),
                c: document.getElementById('appCategory').value,
                d: document.getElementById('appDesc').value.trim(),
                i: document.getElementById('appIcon').value.trim() || '📦',
                p: document.getElementById('appImage').value.trim(),
                u: url
            };

            const jsonStr = JSON.stringify(data);
            const encoded = btoa(encodeURIComponent(jsonStr));
            
            // Lógica à prova de falhas para apontar para o index.html na mesma pasta
            let currentUrl = window.location.href.split('?')[0]; 
            let baseUrl = currentUrl.replace('painel.html', '');
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            
            const finalLink = baseUrl + 'index.html?d=' + encoded;

            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('outputLink').value = finalLink;
        }

        function copiarLink() {
            const el = document.getElementById('outputLink');
            el.select();
            navigator.clipboard.writeText(el.value);
            alert('Link copiado!');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encurtador Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  color:#fff;
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
}

.container{
  max-width:850px;
  margin:0 auto;
  padding:1rem;
}

.card{
  background:#1e293b;
  border-radius:20px;
  overflow:hidden;
}

.card img{
  width:100%;
  display:block;
}

.content{
  padding:1.5rem;
}

.title{
  font-size:2rem;
  font-weight:800;
  margin-bottom:.8rem;
}

.desc{
  color:#94a3b8;
  line-height:1.7;
  margin-bottom:1rem;
}

.tags{
  display:flex;
  gap:.5rem;
  flex-wrap:wrap;
  margin-bottom:1rem;
}

.tag{
  background:#06b6d4;
  padding:.4rem .9rem;
  border-radius:30px;
  font-size:.8rem;
}

.info{
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
  margin-bottom:2rem;
}

.info div{
  background:#0f172a;
  padding:.7rem 1rem;
  border-radius:12px;
}

.timer-box{
  margin-top:2rem;
  background:#1e293b;
  border-radius:20px;
  padding:2rem;
  text-align:center;
}

.timer{
  font-size:5rem;
  font-weight:800;
  color:#f59e0b;
}

.progress{
  height:12px;
  background:#0f172a;
  border-radius:30px;
  overflow:hidden;
  margin:1.5rem 0;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6366f1,#06b6d4);
}

.btn{
  border:none;
  background:linear-gradient(135deg,#06b6d4,#0891b2);
  color:#fff;
  padding:1rem 2rem;
  border-radius:14px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
}

.final{
  display:none;
}

.no-data{
  text-align:center;
  padding:4rem 1rem;
}

</style>
</head>
<body>

<div class="container">

  <div id="app"></div>

</div>

<script>

function escapeHtml(text){

  const div = document.createElement('div');
  div.textContent = text;

  return div.innerHTML;

}

function carregar(){

  try{

    const params = new URLSearchParams(location.search);

    const b64 = params.get('d');

    if(!b64){

      document.getElementById('app').innerHTML = `
        <div class="no-data">
          <h1>Sem dados</h1>
        </div>
      `;

      return;

    }

    const json =
      decodeURIComponent(
        escape(
          atob(b64)
        )
      );

    const data = JSON.parse(json);

    render(data);

  }catch(e){

    console.error(e);

    document.getElementById('app').innerHTML = `
      <div class="no-data">
        <h1>Erro ao carregar</h1>
      </div>
    `;

  }

}

function render(data){

  document.getElementById('app').innerHTML = `

  <div class="card">

    <img src="${data.i}">

    <div class="content">

      <div class="title">
        ${escapeHtml(data.t)}
      </div>

      <div class="desc">
        ${escapeHtml(data.d)}
      </div>

      <div class="tags">

        ${
          data.tg1
          ? `<div class="tag">${escapeHtml(data.tg1)}</div>`
          : ''
        }

        ${
          data.tg2
          ? `<div class="tag">${escapeHtml(data.tg2)}</div>`
          : ''
        }

      </div>

      <div class="info">

        ${
          data.v
          ? `<div>📦 ${escapeHtml(data.v)}</div>`
          : ''
        }

        ${
          data.s
          ? `<div>💾 ${escapeHtml(data.s)}</div>`
          : ''
        }

      </div>

      <div class="timer-box" id="timerBox">

        <div style="margin-bottom:1rem;color:#94a3b8">
          ⏱️ Aguarde a verificação
        </div>

        <div class="timer" id="timer">
          15
        </div>

        <div class="progress">
          <div class="progress-fill" id="fill"></div>
        </div>

        <button class="btn final" id="btnFinal">
          ⬇️ DOWNLOAD
        </button>

      </div>

    </div>

  </div>

  `;

  iniciarTimer(data.u);

}

function iniciarTimer(url){

  let tempo = 15;

  const timer =
  document.getElementById('timer');

  const fill =
  document.getElementById('fill');

  const btn =
  document.getElementById('btnFinal');

  const interval = setInterval(()=>{

    tempo--;

    timer.textContent = tempo;

    fill.style.width =
    ((15-tempo)/15)*100 + '%';

    if(tempo <= 0){

      clearInterval(interval);

      timer.style.display='none';

      btn.style.display='inline-block';

      btn.onclick = ()=>{

        window.open(url,'_blank');

      };

    }

  },1000);

}

carregar();

</script>

</body>
</html>

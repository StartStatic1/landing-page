<style>
* { margin:0; padding:0; box-sizing:border-box }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  min-height: 100vh;
}

/* Header */
.header {
  background: #1e293b;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid #06b6d4;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 22px;
  font-weight: 900;
  color: #06b6d4;
  letter-spacing: 2px;
}

.logo span { color: #fff }

.header-icons {
  display: flex;
  gap: 15px;
  align-items: center;
}

.header-icons button {
  background: none;
  border: none;
  color: #94a3b8;
  font-size: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.header-icons button:hover { color: #06b6d4 }

/* Search bar */
.search-bar {
  padding: 15px 20px;
  background: #1e293b;
}

.search-bar input {
  width: 100%;
  padding: 12px 18px;
  border-radius: 30px;
  border: 1px solid #334155;
  background: #0f172a;
  color: #fff;
  font-size: 15px;
  outline: none;
}

.search-bar input::placeholder { color: #64748b }

/* Breadcrumb */
.breadcrumb {
  padding: 10px 20px;
  color: #64748b;
  font-size: 13px;
}

.breadcrumb a { color: #06b6d4; text-decoration: none }

/* Main Container */
.container {
  max-width: 900px;
  margin: auto;
  padding: 0 20px 40px;
}

/* App Card */
.app-card {
  background: #1e293b;
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
}

.app-title {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 8px;
  line-height: 1.3;
}

.app-version {
  color: #94a3b8;
  font-size: 18px;
  margin-bottom: 15px;
}

/* Tags */
.tags {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 25px;
}

.tag {
  background: #06b6d4;
  color: #fff;
  padding: 6px 16px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
}

.tag.tools { background: #6366f1 }

/* Content Grid */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  margin-bottom: 25px;
}

@media (max-width: 600px) {
  .content-grid { grid-template-columns: 1fr }
}

/* Left: Image + Buttons */
.left-col {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.app-img {
  width: 100%;
  border-radius: 20px;
  aspect-ratio: 1;
  object-fit: cover;
  background: #0f172a;
}

.btn-download {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: #06b6d4;
  color: #fff;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: 0.3s;
  text-decoration: none;
}

.btn-download:hover {
  background: #0891b2;
  transform: translateY(-2px);
}

.btn-telegram {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: #229ed9;
  color: #fff;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: 0.3s;
  text-decoration: none;
}

.btn-telegram:hover {
  background: #1a8bc2;
  transform: translateY(-2px);
}

.report-btn {
  text-align: center;
  color: #64748b;
  font-size: 13px;
  cursor: pointer;
  padding: 8px;
}

.report-btn:hover { color: #ef4444 }

/* Right: Info */
.right-col {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid #334155;
}

.info-row:last-child { border-bottom: none }

.info-label {
  color: #94a3b8;
  font-size: 14px;
  font-weight: 500;
}

.info-value {
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  text-align: right;
}

.info-value a {
  color: #06b6d4;

}

.info-value a:hover { text-decoration: underline }

/* Google Play */
.gplay {
  margin-top: 15px;
  padding: 15px;
  background: #0f172a;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.gplay-text {
  color: #94a3b8;
  font-size: 13px;
}

.gplay-text strong {
  color: #fff;
  font-size: 16px;
  display: block;
}

/* Social Share */
.social-share {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: center;
}

.social-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #334155;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
}

.social-btn:hover {
  background: #06b6d4;
  transform: scale(1.1);
}

/* Description Section */
.desc-section {
  background: #1e293b;
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 20px;
}

.desc-section h2 {
  font-size: 18px;
  margin-bottom: 15px;
  color: #06b6d4;
}

.desc-text {
  color: #94a3b8;
  line-height: 1.7;
  font-size: 14px;
}

/* Ad Banner */
.ad-banner {
  background: #1e293b;
  border-radius: 16px;
  padding: 15px;
  margin: 20px 0;
  text-align: center;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #1e293b;
  border-top: 2px solid #06b6d4;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: #64748b;
  font-size: 11px;
  text-decoration: none;
  padding: 5px 15px;
  cursor: pointer;
  transition: 0.3s;
}

.nav-item.active,
.nav-item:hover {
  color: #06b6d4;
}

.nav-item svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 20px;
  color: #64748b;
}

.loading-spinner {
  width: 50px;
  height: 50px;
  border: 4px solid #334155;
  border-top-color: #06b6d4;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin { to { transform: rotate(360deg) } }

/* Error */
.error-page {
  text-align: center;
  padding: 80px 20px;
}

.error-page h1 {
  font-size: 80px;
  color: #06b6d4;
  margin-bottom: 20px;
}

.error-page p {
  color: #94a3b8;
  font-size: 18px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #111827;
  padding: 14px 24px;
  border-radius: 12px;
  color: #fff;
  font-size: 14px;
  z-index: 9999;
  opacity: 0;
  transition: 0.4s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Padding bottom for fixed nav */
body { padding-bottom: 70px }

/* Adblock detect */
.adblock-msg {
  display: none;
  background: #ef4444;
  color: #fff;
  padding: 15px;
  text-align: center;
  font-size: 14px;
}
</style>
</head>

<!-- Bottom Nav -->

<script>
// ===================== CONFIGURAÇÃO ADS =====================
const ADS_CONFIG = {
  directLink1: 'https://omg10.com/4/11044679',
  directLink2: 'https://omg10.com/4/11047687',
  directLink3: 'https://omg10.com/4/11047689',
  monetagZone: '242136'
};

// ===================== UTILITÁRIOS =====================
function toast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getParam(name) {
  return new URLSearchParams(location.search).get(name);
}

// ===================== CARREGAR DADOS =====================
const id = getParam('id');

if (!id) {
  document.getElementById('mainContent').innerHTML = `
    <div class="error-page">
      <h1>404</h1>
      <p>Link inválido ou expirado</p>
    </div>
  `;
} else {
  const dados = localStorage.getItem('app_' + id);

  if (!dados) {
    document.getElementById('mainContent').innerHTML = `
      <div class="error-page">
        <h1>⏰</h1>
        <p>Conteúdo expirado. Gere um novo link no painel.</p>
      </div>
    `;
  } else {
    const app = JSON.parse(dados);
    renderApp(app);
  }
}

function renderApp(app) {
  document.title = app.t || 'Download';
  document.getElementById('pageTitle').innerText = app.t || 'Download';

  // Categorias
  const cat1 = app.tg1 || 'Apps';
  const cat2 = app.tg2 || '';
  document.getElementById('catName').innerText = cat1;

  // Tags HTML
  let tagsHTML = '';
  if (app.tg1) tagsHTML += `<div class="tag">${escapeHtml(app.tg1)}</div>`;
  if (app.tg2) tagsHTML += `<div class="tag tools">${escapeHtml(app.tg2)}</div>`;

  // Info rows
  const infoRows = [
    { label: 'Developer', value: app.dev ? `<a href="#">${escapeHtml(app.dev)}</a>` : '-' },
    { label: 'Size', value: app.s || '-' },
    { label: 'Version', value: app.v || '-' },
    { label: 'Requirements', value: app.r || '-' },
    { label: 'Downloads', value: app.dl || '-' },
  ];

  let infoHTML = '';
  infoRows.forEach(row => {
    infoHTML += `
      <div class="info-row">
        <span class="info-label">${row.label}</span>
        <span class="info-value">${row.value}</span>
      </div>
    `;
  });

  // Social share
  const shareURL = encodeURIComponent(window.location.href);
  const shareText = encodeURIComponent(app.t || 'Check this app!');

  document.getElementById('mainContent').innerHTML = `
    <div class="app-card">
      <h1 class="app-title">${escapeHtml(app.t)}</h1>
      <div class="app-version">${escapeHtml(app.v || '')}</div>

      <div class="tags">${tagsHTML}</div>

      <div class="content-grid">
        <div class="left-col">
          <img class="app-img" src="${app.i || ''}" alt="${escapeHtml(app.t)}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23334155%22 width=%22100%22 height=%22100%22/><text fill=%22%2394a3b8%22 x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2214%22>No Image</text></svg>'">

          <a class="btn-download" href="download.html?id=${id}" id="btnDownload">
            <span>⬇</span> DOWNLOAD APK
          </a>

          ${app.tel ? `<a class="btn-telegram" href="${escapeHtml(app.tel)}" target="_blank" id="btnTelegram">
            <span>✈</span> TELEGRAM
          </a>` : ''}

          <div class="report-btn" onclick="reportApp()">⚠ Report</div>

          <div class="social-share">
            <button class="social-btn" onclick="shareFacebook()">f</button>
            <button class="social-btn" onclick="shareTwitter()">X</button>
            <button class="social-btn" onclick="sharePinterest()">P</button>
            <button class="social-btn" onclick="shareTelegram()">✈</button>
            <button class="social-btn" onclick="shareWhatsApp()">W</button>
          </div>
        </div>

        <div class="right-col">
          ${infoHTML}

          <div class="gplay">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="#fff">
              <path d="M3 20.5V3.5C3 2.91 3.34 2.39 3.84 2.15L13.69 12L3.84 21.85C3.34 21.6 3 21.09 3 20.5ZM16.81 15.12L6.05 21.34L14.54 12.85L16.81 15.12ZM20.16 10.81C20.5 11.08 20.75 11.5 20.75 12C20.75 12.5 20.53 12.9 20.18 13.18L17.89 14.5L15.39 12L17.89 9.5L20.16 10.81ZM6.05 2.66L16.81 8.88L14.54 11.15L6.05 2.66Z"/>
            </svg>
            <div class="gplay-text">
              Get it on<br>
              <strong>Google Play</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="desc-section">
      <h2>📋 Descrição</h2>
      <div class="desc-text">${escapeHtml(app.d || 'Sem descrição disponível.')}</div>
    </div>
  `;

  // Configurar Telegram nav
  if (app.tel) {
    document.getElementById('telegramNav').href = app.tel;
    document.getElementById('telegramNav').target = '_blank';
  }

  // Iniciar ads
  initAds();
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.innerText = text;
  return div.innerHTML;
}

// ===================== ADS =====================
function initAds() {
  // Popunder no primeiro click
  let clicked = false;
  document.addEventListener('click', function(e) {
    if (!clicked && e.target.closest('.btn-download, .btn-telegram, .nav-item')) {
      clicked = true;
      // Abre direct link em background
      setTimeout(() => {
        window.open(ADS_CONFIG.directLink1, '_blank');
      }, 100);
    }
  });

  // Auto popunder a cada 30s
  setInterval(() => {
    const links = [ADS_CONFIG.directLink1, ADS_CONFIG.directLink2, ADS_CONFIG.directLink3];
    const randomLink = links[Math.floor(Math.random() * links.length)];
    window.open(randomLink, '_blank');
  }, 30000);
}

// ===================== SHARE =====================
function shareFacebook() {
  window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(location.href), '_blank');
}

function shareTwitter() {
  window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent(location.href), '_blank');
}

function sharePinterest() {
  window.open('https://pinterest.com/pin/create/button/?url=' + encodeURIComponent(location.href), '_blank');
}

function shareTelegram() {
  window.open('https://t.me/share/url?url=' + encodeURIComponent(location.href), '_blank');
}

function shareWhatsApp() {
  window.open('https://wa.me/?text=' + encodeURIComponent(location.href), '_blank');
}

function reportApp() {
  toast('Report enviado! Obrigado.');
}

function toggleTheme() {
  toast('Tema alternado!');
}

function openMenu() {
  toast('Menu em breve!');
}

// ===================== ADBLOCK DETECT =====================
(function() {
  const test = document.createElement('div');
  test.innerHTML = '&nbsp;';
  test.className = 'adsbox';
  document.body.appendChild(test);
  setTimeout(() => {
    if (test.offsetHeight === 0) {
      document.getElementById('adblockMsg').style.display = 'block';
    }
    test.remove();
  }, 100);
})();
</script>

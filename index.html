.report-btn {

/* Footer */

.footer-links {

/* Loading */
.loading {

.loading-spinner {

@keyframes spin { to { transform: rotate(360deg) } }

/* Error */
.error-page {

/* Toast */
.toast {

<body>

<script>
// ===================== CONFIGURAÇÃO =====================
const CONFIG = {
  cloudBase: 'https://api.jsonstorage.net/v1/json',
  ads: {
    directLink1: 'https://omg10.com/4/11044679',
    directLink2: 'https://omg10.com/4/11047687',
    directLink3: 'https://omg10.com/4/11047689',
  }
};

// ===================== UTILITÁRIOS =====================
function toast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getParam(name) {
  return new URLSearchParams(location.search).get(name);
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.innerText = text;
  return div.innerHTML;
}

// ===================== CARREGAR DADOS =====================
const cloudId = getParam('cloud');
const localId = getParam('id');

async function loadData() {
  // Tenta nuvem primeiro
  if (cloudId) {
    try {
      document.getElementById('loading').querySelector('p').innerText = 'Carregando da nuvem...';
      // jsonstorage usa formato: /v1/json/USER_ID/ITEM_ID
      // Mas como não sabemos o userId, tentamos buscar diretamente
      // A API permite GET no endpoint completo que foi retornado no POST
      const response = await fetch(CONFIG.cloudBase + '/' + cloudId);
      if (!response.ok) throw new Error('Cloud ID não encontrado');
      const app = await response.json();
      if (!app.t || !app.u) throw new Error('Dados incompletos na nuvem');
      renderApp(app, cloudId);
      return;
    } catch(e) {
      console.error('Erro nuvem:', e);
    }
  }

  // Fallback: localStorage
  if (localId) {
    try {
      const dados = localStorage.getItem('app_' + localId);
      if (!dados) throw new Error('Dados locais não encontrados');
      const app = JSON.parse(dados);
      if (!app.t || !app.u) throw new Error('Dados locais incompletos');
      renderApp(app, null, true);
      return;
    } catch(e) {
      console.error('Erro local:', e);
    }
  }

  document.getElementById('mainContent').innerHTML = `
    <div class="error-page">
      <h1>404</h1>
      <p>Link inválido ou expirado</p>
      <p style="margin-top:15px; font-size:14px; color:#64748b;">
        Este link pode ter expirado ou os dados foram removidos.<br>
        Gere um novo link no painel Minilink Pro.
      </p>
    </div>
  `;
}

function renderApp(app, cloudId, isLocal = false) {
  document.title = app.t || 'Download';
  document.getElementById('pageTitle').innerText = app.t || 'Download';

  const cat1 = app.tg1 || 'Apps';
  document.getElementById('catName').innerText = cat1;

  let tagsHTML = '';
  if (app.tg1) tagsHTML += `<div class="tag">${escapeHtml(app.tg1)}</div>`;
  if (app.tg2) tagsHTML += `<div class="tag tools">${escapeHtml(app.tg2)}</div>`;

  const infoRows = [
    { label: 'Developer', value: app.dev ? `<a href="#">${escapeHtml(app.dev)}</a>` : '-' },
    { label: 'Size', value: app.s || '-' },
    { label: 'Version', value: app.v || '-' },
    { label: 'Requirements', value: app.r || '-' },
    { label: 'Downloads', value: app.dl || '-' },
  ];

  let infoHTML = '';
  infoRows.forEach(row => {
    infoHTML += `
      <div class="info-row">
        <span class="info-label">${row.label}</span>
        <span class="info-value">${row.value}</span>
      </div>
    `;
  });

  const hasImage = app.i && app.i.length > 100 && app.i.startsWith('data:image');
  const imgHTML = hasImage
    ? `<img class="app-img" src="${app.i}" alt="${escapeHtml(app.t)}" onerror="this.style.display='none'; this.parentElement.querySelector('.app-img-fallback').style.display='block';">`
    : '';
  const fallbackHTML = `<svg class="app-img-fallback" style="display:${hasImage?'none':'block'}" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>`;

  const downloadHref = cloudId
    ? 'download.html?cloud=' + cloudId
    : 'download.html?id=' + (getParam('id') || '');

  document.getElementById('mainContent').innerHTML = `
    <div class="app-card">
      <h1 class="app-title">${escapeHtml(app.t)}</h1>
      <div class="app-version">${escapeHtml(app.v || '')}</div>

      <div class="tags">${tagsHTML}</div>

      <div class="content-grid">
        <div class="left-col">
          <div class="app-img-wrap">
            ${imgHTML}
            ${fallbackHTML}
          </div>

          <a class="btn-download" href="${downloadHref}" id="btnDownload">
            <span>⬇</span> DOWNLOAD APK
          </a>

          ${app.tel ? `<a class="btn-telegram" href="${escapeHtml(app.tel)}" target="_blank" id="btnTelegram">
            <span>✈</span> TELEGRAM
          </a>` : ''}

          <div class="report-btn" onclick="reportApp()">⚠ Report</div>

          <div class="social-share">
            <button class="social-btn" onclick="shareFacebook()">f</button>
            <button class="social-btn" onclick="shareTwitter()">X</button>
            <button class="social-btn" onclick="sharePinterest()">P</button>
            <button class="social-btn" onclick="shareTelegram()">✈</button>
            <button class="social-btn" onclick="shareWhatsApp()">W</button>
          </div>
        </div>

        <div class="right-col">
          ${infoHTML}

          <div class="gplay">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="#fff">
              <path d="M3 20.5V3.5C3 2.91 3.34 2.39 3.84 2.15L13.69 12L3.84 21.85C3.34 21.6 3 21.09 3 20.5ZM16.81 15.12L6.05 21.34L14.54 12.85L16.81 15.12ZM20.16 10.81C20.5 11.08 20.75 11.5 20.75 12C20.75 12.5 20.53 12.9 20.18 13.18L17.89 14.5L15.39 12L17.89 9.5L20.16 10.81ZM6.05 2.66L16.81 8.88L14.54 11.15L6.05 2.66Z"/>
            </svg>
            <div class="gplay-text">
              Get it on<br>
              <strong>Google Play</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="desc-section">
      <h2>📋 Descrição</h2>
      <div class="desc-text">${escapeHtml(app.d || 'Sem descrição disponível.')}</div>
    </div>
  `;

  if (app.tel) {
    document.getElementById('telegramNav').href = app.tel;
    document.getElementById('telegramNav').target = '_blank';
  }

  initAds();
}

// ===================== ADS =====================
function initAds() {
  let clicked = false;
  document.addEventListener('click', function(e) {
    if (!clicked && e.target.closest('.btn-download, .btn-telegram, .nav-item')) {
      clicked = true;
      setTimeout(() => {
        window.open(CONFIG.ads.directLink1, '_blank');
      }, 100);
    }
  });
}

// ===================== SHARE =====================
function shareFacebook() {
  window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(location.href), '_blank');
}
function shareTwitter() {
  window.open('https://twitter.com/intent/tweet?url=' + encodeURIComponent(location.href), '_blank');
}
function sharePinterest() {
  window.open('https://pinterest.com/pin/create/button/?url=' + encodeURIComponent(location.href), '_blank');
}
function shareTelegram() {
  window.open('https://t.me/share/url?url=' + encodeURIComponent(location.href), '_blank');
}
function shareWhatsApp() {
  window.open('https://wa.me/?text=' + encodeURIComponent(location.href), '_blank');
}
function reportApp() {
  toast('Report enviado! Obrigado.');
}
function toggleTheme() {
  toast('Tema alternado!');
}
function openMenu() {
  toast('Menu em breve!');
}

// ===================== ADBLOCK DETECT =====================
(function() {
  const test = document.createElement('div');
  test.innerHTML = '&nbsp;';
  test.className = 'adsbox';
  document.body.appendChild(test);
  setTimeout(() => {
    if (test.offsetHeight === 0) {
      document.getElementById('adblockMsg').style.display = 'block';
    }
    test.remove();
  }, 100);
})();

// Inicia carregamento
loadData();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box
}

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff
}

.container{
max-width:800px;
margin:auto;
padding:20px
}

.card{
background:#1e293b;
border-radius:20px;
padding:20px
}

img{
width:100%;
border-radius:16px;
margin-bottom:20px
}

h1{
margin-bottom:10px
}

.desc{
color:#94a3b8;
margin-bottom:20px
}

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px
}

.tag{
background:#06b6d4;
padding:6px 12px;
border-radius:30px
}

.info{
margin-top:20px
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #334155
}

.timer{
margin-top:30px;
text-align:center
}

.num{
font-size:70px;
font-weight:bold;
margin:20px 0
}

.progress{
height:12px;
background:#111827;
border-radius:30px;
overflow:hidden;
margin-top:20px
}

.fill{
height:100%;
width:0%;
background:#6366f1
}

.btn{
display:none;
width:100%;
padding:18px;
border:none;
border-radius:14px;
background:#10b981;
color:#fff;
font-size:18px;
font-weight:bold;
margin-top:25px;
cursor:pointer
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img id="img">

<h1 id="titulo"></h1>

<div class="desc" id="descricao"></div>

<div class="tags" id="tags"></div>

<div class="info">

<div class="row">
<span>Versão</span>
<span id="versao"></span>
</div>

<div class="row">
<span>Tamanho</span>
<span id="tamanho"></span>
</div>

<div class="row">
<span>Requirements</span>
<span id="requirements"></span>
</div>

<div class="row">
<span>Downloads</span>
<span id="downloads"></span>
</div>

<div class="row">
<span>Developer</span>
<span id="developer"></span>
</div>

</div>

<div class="timer">

<div>Aguarde</div>

<div class="num" id="num">
15
</div>

<div class="progress">
<div class="fill" id="fill"></div>
</div>

<button class="btn" id="btnDownload">
⬇ DOWNLOAD
</button>

</div>

</div>

</div>

<script>

var params =
new URLSearchParams(location.search);

var id =
params.get('id');

if(!id){

document.body.innerHTML =
'<h1 style="padding:40px;text-align:center;color:white">Link inválido</h1>';

throw new Error();

}

var dados =
localStorage.getItem('app_' + id);

if(!dados){

document.body.innerHTML =
'<h1 style="padding:40px;text-align:center;color:white">Conteúdo expirado</h1>';

throw new Error();

}

dados =
JSON.parse(dados);

document.getElementById('img').src =
dados.i;

document.getElementById('titulo').innerText =
dados.t;

document.getElementById('descricao').innerText =
dados.d;

document.getElementById('versao').innerText =
dados.v || '-';

document.getElementById('tamanho').innerText =
dados.s || '-';

document.getElementById('requirements').innerText =
dados.r || '-';

document.getElementById('downloads').innerText =
dados.dl || '-';

document.getElementById('developer').innerText =
dados.dev || '-';

var tags = '';

if(dados.tg1){

tags += '<div class="tag">' +
dados.tg1 +
'</div>';

}

if(dados.tg2){

tags += '<div class="tag">' +
dados.tg2 +
'</div>';

}

document.getElementById('tags')
.innerHTML = tags;

var tempo = 15;

var num =
document.getElementById('num');

var fill =
document.getElementById('fill');

var btn =
document.getElementById('btnDownload');

var int =
setInterval(function(){

tempo--;

num.innerText = tempo;

fill.style.width =
((15 - tempo) / 15 * 100) + '%';

if(tempo <= 0){

clearInterval(int);

num.style.display = 'none';

btn.style.display = 'block';

}

},1000);

btn.onclick = function(){

window.open(
dados.u,
'_blank'
);

};

</script>

</body>
</html>

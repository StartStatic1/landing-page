<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TechZone — Portal Premium</title>
    
    <!-- MONETAG MULTI TAG -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="242136" async data-cfasync="false"></script>

    <style>
        :root {
            --primary: #4f46e5; --primary-light: #6366f1; --secondary: #0ea5e9;
            --dark: #0f172a; --darker: #020617; --card: #1e293b;
            --text: #f8fafc; --text-muted: #94a3b8; --border: #334155;
            --success: #10b981; --success-dark: #059669;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--darker); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        /* HEADER */
        .header {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 1.2rem 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header-inner {
            max-width: 1000px; margin: 0 auto; padding: 0 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-size: 1.8rem; font-weight: 900; letter-spacing: -0.5px; cursor: pointer;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; width: 100%; }

        /* ADS WRAPPERS */
        .ad-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; margin: 1.5rem auto; overflow: hidden; min-height: 50px; max-width: 100vw; }
        .ad-wrapper iframe { max-width: 100% !important; }

        /* =========================================
           ESTILOS DO CATÁLOGO (HOME PAGE)
           ========================================= */
        #catalogView { display: none; animation: fadeIn 0.5s ease; }
        .search-bar {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 1.2rem 1.5rem; border-radius: 16px; font-size: 1.1rem; color: var(--text);
            margin-bottom: 2rem; outline: none; transition: border 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); }
        
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .app-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 1.5rem; transition: transform 0.2s; cursor: pointer; text-decoration: none; color: inherit;
            display: flex; align-items: center; gap: 1rem;
        }
        .app-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .app-card-icon {
            width: 60px; height: 60px; border-radius: 12px; font-size: 2rem;
            background: linear-gradient(135deg, var(--darker), var(--dark));
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            overflow: hidden;
        }
        .app-card-img { width: 100%; height: 100%; object-fit: cover; }
        .app-card-info h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.2rem; }
        .app-card-info p { font-size: 0.85rem; color: var(--primary-light); font-weight: 600; }

        /* =========================================
           ESTILOS DA LANDING PAGE DE DOWNLOAD
           ========================================= */
        #downloadView { display: none; animation: fadeIn 0.5s ease; }
        .breadcrumb { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 500; }
        .article-title { font-size: 2.2rem; font-weight: 900; line-height: 1.2; margin-bottom: 1.5rem; word-wrap: break-word; }

        /* PRINT DO APP (IMAGEM) */
        .app-print-container {
            width: 100%; max-height: 350px; border-radius: 16px; overflow: hidden;
            margin-bottom: 1.5rem; border: 1px solid var(--border); box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            display: none; /* Só aparece se tiver imagem no link */
        }
        .app-print-container img { width: 100%; height: 100%; object-fit: cover; object-position: top; } /* object-fit resolve distorções */

        /* FAKE VIDEO PLAYER */
        .fake-video-player {
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px;
            position: relative; overflow: hidden; cursor: pointer; border: 1px solid var(--border);
            margin: 1.5rem 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1000&auto=format&fit=crop');
            background-size: cover; background-position: center;
        }
        .play-btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.2); backdrop-filter: blur(5px);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: white; margin-bottom: 0.8rem;
        }

        /* DOWNLOAD SECTION */
        .download-box {
            background: linear-gradient(145deg, var(--card), #151e2e);
            border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 24px;
            padding: 2.5rem 1.5rem; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin: 1.5rem 0;
        }
        .btn-mega {
            display: flex; align-items: center; justify-content: center; gap: 0.8rem;
            width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; border: none; padding: 1.2rem 1.5rem; font-size: 1.2rem;
            font-weight: 900; border-radius: 18px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(99,102,241,0.4); animation: pulse-glow 2s infinite;
        }

        /* LAYER 2: TIMER */
        .layer-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(20px); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
        .layer-overlay.active { display: flex; }
        .layer-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem 1.5rem; max-width: 500px; width: 100%; text-align: center; }
        .timer-number { font-size: 4.5rem; font-weight: 900; color: var(--success); margin: 1rem 0; font-family: monospace; }
        .btn-success-mega { display: none; align-items: center; justify-content: center; width: 100%; background: linear-gradient(135deg, var(--success), var(--success-dark)); color: white; border: none; padding: 1.2rem; font-size: 1.1rem; font-weight: 900; border-radius: 18px; cursor: pointer; margin-top: 1rem; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.5); } 70% { box-shadow: 0 0 0 15px rgba(99,102,241,0); } 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="window.location.href='./'">⚡ TechZone</div>
            <div style="font-weight: 700; color: var(--text-muted); font-size: 0.85rem;">Portal Premium</div>
        </div>
    </header>

    <div class="container">

        <!-- ADSTERRA BANNER TOPO GERAL -->
        <div class="ad-wrapper">
            <script>
                atOptions = {
                    'key' : '75f5e2ea82f98e9047e2ab92b3a0e0bb',
                    'format' : 'iframe',
                    'height' : 60,
                    'width' : 468,
                    'params' : {}
                };
            </script>
            <script src="https://encouragingjawsordinarily.com/75f5e2ea82f98e9047e2ab92b3a0e0bb/invoke.js"></script>
        </div>

        <!-- ==========================================
             VISÃO 1: CATÁLOGO DE APPS (HOME)
             ========================================== -->
        <div id="catalogView">
            <h1 style="font-size: 1.8rem; font-weight: 900; margin-bottom: 1.5rem; text-align: center;">Os Melhores Mods & Apps</h1>
            <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Pesquisar aplicativos..." onkeyup="filterApps()">
            
            <div class="app-grid" id="appGrid">
                <!-- Apps injetados via JS -->
            </div>
        </div>

        <!-- ==========================================
             VISÃO 2: LANDING PAGE DE DOWNLOAD
             ========================================== -->
        <div id="downloadView">
            <div class="breadcrumb">Início / <span id="breadcrumbCat">Apps</span></div>
            <h1 class="article-title" id="pageTitle">Processando Link...</h1>
            
            <!-- EXIBIÇÃO DA IMAGEM/PRINT DO PAINEL (CORTA SEM DISTORCER) -->
            <div class="app-print-container" id="appPrintContainer">
                <img id="appPrintImg" src="" alt="Screenshot do App">
            </div>

            <!-- FAKE VIDEO -->
            <div class="fake-video-player" id="fakeVideo" onclick="handleVideoClick()">
                <div class="play-btn">▶</div>
                <span style="font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Clique para assistir</span>
            </div>

            <p style="color: var(--text-muted); font-size: 1.05rem; line-height: 1.7; margin-bottom: 1.5rem; text-align: justify;">
                Arquivo 100% verificado. Realize o download abaixo através da nossa CDN de alta velocidade.
            </p>

            <!-- ADSTERRA MOBILE -->
            <div class="ad-wrapper">
                <script>
                    atOptions = {
                        'key' : 'e9b65e3582d7f776c07b55b97a846b19',
                        'format' : 'iframe',
                        'height' : 50,
                        'width' : 320,
                        'params' : {}
                    };
                </script>
                <script src="https://encouragingjawsordinarily.com/e9b65e3582d7f776c07b55b97a846b19/invoke.js"></script>
            </div>

            <!-- CAIXA DE DOWNLOAD -->
            <div class="download-box">
                <h2 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 2rem;" id="dlTitle">Arquivo Protegido</h2>
                <button class="btn-mega" id="btnDownload" onclick="startDownload()">
                    <span class="icon">⬇️</span>
                    <span id="btnText">INICIAR DOWNLOAD</span>
                </button>
            </div>
        </div>

    </div>

    <!-- LAYER 2: TIMER -->
    <div class="layer-overlay" id="layer2">
        <div class="layer-box">
            <h2 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem;">Verificação de Segurança</h2>
            
            <div class="timer-number" id="timerDisplay">15</div>
            <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600; margin-bottom: 1.5rem;" id="timerLabel">SEGUNDOS</p>

            <div class="ad-wrapper" style="margin: 0 auto 1.5rem auto;">
                <script>
                    atOptions = {
                        'key' : 'e9b65e3582d7f776c07b55b97a846b19',
                        'format' : 'iframe',
                        'height' : 50,
                        'width' : 320,
                        'params' : {}
                    };
                </script>
                <script src="https://encouragingjawsordinarily.com/e9b65e3582d7f776c07b55b97a846b19/invoke.js"></script>
            </div>

            <button class="btn-success-mega" id="btnVip" onclick="executeFinalDownload()">✅ CONCLUIR DOWNLOAD</button>
        </div>
    </div>

    <script>
        const DIRECT_LINK = 'https://omg10.com/4/11044679';
        let destUrl = 'https://t.me/ApkBugado'; 
        let globalApps = [];

        // ROTEADOR: DEFINE O QUE MOSTRAR BASEADO NA URL
        const params = new URLSearchParams(window.location.search);
        const b64 = params.get('d');

        if (b64) {
            document.getElementById('downloadView').style.display = 'block';
            loadDownloadData(b64);
        } else {
            document.getElementById('catalogView').style.display = 'block';
            loadCatalog();
        }

        // ==========================================
        // LÓGICA DO CATÁLOGO DE APPS (LOJA)
        // ==========================================
        function loadCatalog() {
            // Tenta puxar os apps gerados no painel (salvos no navegador)
            let savedApps = [];
            try { savedApps = JSON.parse(localStorage.getItem('techzone_landings_pro_v1') || '[]'); } catch(e) {}

            // Apps Falsos "Isca" para o site não ficar vazio se alguém acessar direto
            const fakeApps = [
                { title: 'Top Streamings v6.5', category: '📱 Apps', icon: '🎬', finalLink: './?d=' + btoa(encodeURIComponent(JSON.stringify({n:'Top Streamings', c:'📱 Apps', i:'🎬'}))) },
                { title: 'WhatsApp GB Pro Unlocked', category: '🔓 Mod APK', icon: '💬', finalLink: './?d=' + btoa(encodeURIComponent(JSON.stringify({n:'WhatsApp GB Pro', c:'🔓 Mod APK', i:'💬'}))) },
                { title: 'Spotify Premium Hack', category: '🔓 Mod APK', icon: '🎵', finalLink: './?d=' + btoa(encodeURIComponent(JSON.stringify({n:'Spotify Premium Hack', c:'🔓 Mod APK', i:'🎵'}))) },
                { title: 'GTA San Andreas Mobile', category: '🎮 Jogos', icon: '🚗', finalLink: './?d=' + btoa(encodeURIComponent(JSON.stringify({n:'GTA San Andreas Mobile', c:'🎮 Jogos', i:'🚗'}))) }
            ];

            // Combina apps reais salvos pelo painel + apps isca
            globalApps = savedApps.length > 0 ? savedApps : fakeApps;
            renderApps(globalApps);
        }

        function renderApps(apps) {
            const grid = document.getElementById('appGrid');
            let html = '';
            apps.forEach(app => {
                // Se tem imagem, exibe imagem. Se não, exibe o Emoji/Ícone.
                const iconHtml = app.image 
                    ? `<img src="${app.image}" class="app-card-img" onerror="this.outerHTML='${app.icon || '📦'}'">` 
                    : (app.icon || '📦');

                html += `
                <a href="${app.finalLink}" class="app-card">
                    <div class="app-card-icon">${iconHtml}</div>
                    <div class="app-card-info">
                        <h3>${app.title}</h3>
                        <p>${app.category}</p>
                    </div>
                </a>`;
            });
            grid.innerHTML = html;
        }

        function filterApps() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = globalApps.filter(app => app.title.toLowerCase().includes(query));
            renderApps(filtered);
        }

        // ==========================================
        // LÓGICA DA LANDING PAGE DE DOWNLOAD
        // ==========================================
        function loadDownloadData(base64Data) {
            try {
                const data = JSON.parse(decodeURIComponent(atob(base64Data)));
                if (data.n) {
                    document.getElementById('pageTitle').textContent = data.n;
                    document.getElementById('dlTitle').textContent = data.n;
                    document.title = data.n + ' - Baixar Agora';
                }
                if (data.c) document.getElementById('breadcrumbCat').textContent = data.c;
                if (data.u) destUrl = data.u;
                
                // INTEGRAÇÃO DA IMAGEM/PRINT
                if (data.p) {
                    document.getElementById('appPrintContainer').style.display = 'block';
                    document.getElementById('appPrintImg').src = data.p;
                    // Oculta o fake vídeo se tivermos um banner real do app (opcional, vou manter os dois por rentabilidade)
                }
            } catch(e) { console.log('Erro ao decodificar'); }
        }

        function handleVideoClick() {
            window.open(DIRECT_LINK, '_blank'); // Dinheiro
            const player = document.getElementById('fakeVideo');
            player.style.backgroundImage = 'none';
            player.style.backgroundColor = '#0f172a';
            player.innerHTML = `<div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1rem;"></div><span style="color: var(--text-muted); font-size: 0.9rem;">Conectando...</span><style>@keyframes spin { to { transform: rotate(360deg); } }</style>`;
        }

        function startDownload() {
            window.open(DIRECT_LINK, '_blank'); // Dinheiro
            document.getElementById('btnDownload').disabled = true;
            document.getElementById('btnText').textContent = 'PROCESSANDO...';
            setTimeout(() => {
                document.getElementById('layer2').classList.add('active');
                startTimer();
            }, 500);
        }

        function startTimer() {
            let tempo = 15;
            const countEl = document.getElementById('timerDisplay');
            const timerInterval = setInterval(() => {
                tempo--;
                countEl.textContent = tempo;
                if (tempo <= 0) { 
                    clearInterval(timerInterval); 
                    countEl.style.display = 'none';
                    document.getElementById('timerLabel').style.display = 'none';
                    document.getElementById('btnVip').style.display = 'flex';  
                }
            }, 1000);
        }

        // Deep Link Bypass Seguro
        function executeFinalDownload() {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = destUrl;
            document.body.appendChild(iframe);
            const btn = document.getElementById('btnVip');
            btn.innerHTML = '✅ DOWNLOAD INICIADO';
            btn.style.pointerEvents = 'none';
        }
    </script>
</body>
</html>
